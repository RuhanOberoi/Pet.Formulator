<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — PetForm Pro</title>
  <style>
    *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; color: #e6edf3; font-family: 'DM Sans', 'Segoe UI', system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 16px; padding: 40px; max-width: 440px; width: 100%; }
    .logo { font-size: 56px; text-align: center; margin-bottom: 12px; }
    h1 { color: #f0a500; font-size: 24px; font-weight: 800; margin-bottom: 6px; text-align: center; }
    p.lead { color: #8b949e; font-size: 13px; margin-bottom: 20px; text-align: center; line-height: 1.5; }
    label { display: block; font-size: 11px; color: #8b949e; font-weight: 600; letter-spacing: 0.05em; margin-bottom: 5px; margin-top: 14px; }
    input { width: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; color: #e6edf3; padding: 11px 14px; font-size: 14px; outline: none; font-family: inherit; }
    input:focus { border-color: #f0a500; }
    .btn { width: 100%; background: #f0a500; color: #000; padding: 13px 20px; border: none; border-radius: 8px; font-weight: 800; font-size: 14px; cursor: pointer; margin-top: 16px; }
    .btn:hover { background: #ffb820; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .err { background: rgba(239,68,68,0.10); border: 1px solid rgba(239,68,68,0.35); border-radius: 7px; padding: 10px 14px; color: #ef4444; font-size: 12px; margin-bottom: 12px; line-height: 1.5; }
    .ok { background: rgba(34,197,94,0.10); border: 1px solid rgba(34,197,94,0.35); border-radius: 7px; padding: 10px 14px; color: #22c55e; font-size: 12px; margin-bottom: 12px; line-height: 1.5; }
    .footer { margin-top: 24px; font-size: 11px; color: #555; text-align: center; line-height: 1.5; }
    a { color: #f0a500; }
    .password-wrap { position: relative; }
    .show-btn { position: absolute; right: 10px; top: 11px; background: transparent; border: none; color: #8b949e; font-size: 11px; cursor: pointer; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🔑</div>
    <h1>Set a New Password</h1>
    <p class="lead" id="lead">Enter your new password below. Make sure it's at least 6 characters.</p>

    <div id="error" class="err" style="display:none;"></div>
    <div id="success" class="ok" style="display:none;"></div>

    <div id="form">
      <label>NEW PASSWORD</label>
      <div class="password-wrap">
        <input id="pw1" type="password" placeholder="••••••••" autocomplete="new-password">
        <button type="button" class="show-btn" onclick="togglePw('pw1', this)">SHOW</button>
      </div>

      <label>CONFIRM NEW PASSWORD</label>
      <div class="password-wrap">
        <input id="pw2" type="password" placeholder="••••••••" autocomplete="new-password">
        <button type="button" class="show-btn" onclick="togglePw('pw2', this)">SHOW</button>
      </div>

      <button class="btn" id="submit" onclick="submitReset()">Update Password</button>
    </div>

    <div class="footer">
      <a href="/">← Back to PetForm Pro</a><br>
      Built by Ruhan Oberoi · For reference only
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    // === CONFIGURE THESE ===
    const SUPABASE_URL = 'https://hlyqgjnywzbdombrwbky.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhseXFnam55d3piZG9tYnJ3Ymt5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1MDQ0MTgsImV4cCI6MjA5MzA4MDQxOH0.oUW5O5iKn_3aazWXfSOQiR_7BM_BrBQ0_jqCQbj6_7c';

    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function togglePw(id, btn) {
      const el = document.getElementById(id);
      el.type = el.type === 'password' ? 'text' : 'password';
      btn.textContent = el.type === 'password' ? 'SHOW' : 'HIDE';
    }

    function showError(msg) {
      document.getElementById('error').textContent = '❌ ' + msg;
      document.getElementById('error').style.display = 'block';
      document.getElementById('success').style.display = 'none';
    }

    function showSuccess(msg) {
      document.getElementById('success').innerHTML = '✓ ' + msg;
      document.getElementById('success').style.display = 'block';
      document.getElementById('error').style.display = 'none';
    }

    async function submitReset() {
      const pw1 = document.getElementById('pw1').value;
      const pw2 = document.getElementById('pw2').value;
      if (pw1.length < 6) return showError('Password must be at least 6 characters.');
      if (pw1 !== pw2) return showError('Passwords do not match.');

      const btn = document.getElementById('submit');
      btn.disabled = true;
      btn.textContent = 'Updating...';

      try {
        const { error } = await sb.auth.updateUser({ password: pw1 });
        if (error) throw error;
        showSuccess('Password updated successfully! Redirecting to sign in...');
        document.getElementById('form').style.display = 'none';
        setTimeout(() => { window.location.href = '/'; }, 2500);
      } catch (e) {
        btn.disabled = false;
        btn.textContent = 'Update Password';
        showError(e.message || 'Failed to update password. Try requesting a new reset link.');
      }
    }

    // Verify we have a valid recovery session on load
    (async () => {
      try {
        await new Promise(r => setTimeout(r, 400));  // wait for Supabase to process URL fragment
        const { data: { session } } = await sb.auth.getSession();
        if (!session) {
          showError('Reset link is invalid or expired. Please request a new one from the sign-in page.');
          document.getElementById('form').style.display = 'none';
        }
      } catch (e) {
        showError('Could not verify reset link. ' + e.message);
        document.getElementById('form').style.display = 'none';
      }
    })();
  </script>
</body>
</html>
